<script>
/* ========= بيانات القصص ========= */
const stories = [
  {
    character:"👨‍🌾",
    name:"الراعي الصادق",
    text:(a,b)=>`لدى الراعي ${eastern(a)} حظائر. في كل حظيرة ${eastern(b)} خراف.`,
    visual:(a,b)=>{
      let v="";
      for(let i=0;i<a;i++) v+="🐑 ".repeat(b)+"<br>";
      return v;
    }
  },
  {
    character:"🐝",
    name:"النحلة المجتهدة",
    text:(a,b)=>`هناك ${eastern(a)} خلايا. في كل خلية ${eastern(b)} أقراص عسل.`,
    visual:(a,b)=>{
      let v="";
      for(let i=0;i<a;i++) v+="🍯 ".repeat(b)+"<br>";
      return v;
    }
  },
  {
    character:"🧑‍🌾",
    name:"البستاني الأمين",
    text:(a,b)=>`زرع البستاني ${eastern(a)} صفوف. في كل صف ${eastern(b)} أشجار.`,
    visual:(a,b)=>{
      let v="";
      for(let i=0;i<a;i++) v+="🌳 ".repeat(b)+"<br>";
      return v;
    }
  },
  {
    character:"🎣",
    name:"الصياد الهادئ",
    text:(a,b)=>`اصطاد الصياد ${eastern(a)} شباك. في كل شبكة ${eastern(b)} أسماك.`,
    visual:(a,b)=>{
      let v="";
      for(let i=0;i<a;i++) v+="🐟 ".repeat(b)+"<br>";
      return v;
    }
  }
];

/* ========= التشجيع ========= */
const encouragements=[
  "محاولتك عبادة جميلة 🌷",
  "الله يرى جهدك ويباركه",
  "أحسنت، الصبر مفتاح الخير",
  "كل محاولة ترفعك درجة",
  "النبي ﷺ يحب القوي الأمين"
];

let currentStory=0;

/* ========= تعديل showStep ========= */
function showStep(){
  answer.value="";
  helper.style.display="none";
  visual.innerHTML="";
  answer.style.display = (step===1) ? "block" : "none";

  if(step===0){
    setCharacter("🧔🏻‍♂️","الحكيم إبراهيم");
    storyText.innerText=
    `يا ${student}.
اليوم سنحل مسائل جديدة مع قصص جميلة.
تذكّر: الله مع الصابرين.`;
    if(soundOn) speakText();
  }

  if(step===1){
    const s=stories[currentStory];
    a=Math.floor(Math.random()*3)+2; // ٢–٤
    b=Math.floor(Math.random()*3)+1; // ١–٣
    setCharacter(s.character,s.name);
    storyText.innerText=
      `${s.text(a,b)}
كم المجموع؟`;
    visual.innerHTML=s.visual(a,b);
    if(soundOn) speakText();
  }

  if(step===2){
    setCharacter("🧔🏻‍♂️","الحكيم إبراهيم");
    const msg=encouragements[Math.floor(Math.random()*encouragements.length)];
    storyText.innerText=
      `أحسنت يا ${student}.
${msg}`;
    visual.innerHTML="🌟 🤍 🌱";
    if(soundOn) speakText();
  }
}

/* ========= تعديل solve ========= */
function solve(){
  if(step===0){ step=1; showStep(); return; }

  if(step===1){
    if(Number(answer.value)===a*b){
      step=2;
      currentStory=(currentStory+1)%stories.length;
      showStep();
    }else{
      storyText.innerText=
      `لا بأس يا ${student}.
الخطأ طريق التعلّم.
لنعدّ بهدوء، والله مع الصابرين.`;
      if(soundOn) speakText();
    }
    return;
  }

  if(step===2){
    step=1;
    showStep();
  }
}
</script>
