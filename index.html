<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>البطل الأمين – رحلة التعلم</title>

<style>
body{
  font-family:"Tajawal",Arial;
  margin:0;
  background:#e8f5e9;
  color:#1b5e20;
}
.container{max-width:540px;margin:auto;padding:14px}
.card{
  background:#fff;
  border-radius:18px;
  padding:16px;
  margin-top:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.character{
  display:flex;gap:10px;align-items:center;
}
.avatar{font-size:40px}
.name{font-weight:bold}
.speech{
  background:#e0f2f1;
  padding:14px;
  border-radius:14px;
  line-height:1.8;
}
.visual{text-align:center;font-size:26px;margin:10px 0}
input{
  width:100%;
  font-size:22px;
  text-align:center;
  padding:6px;
}
button{
  padding:8px 14px;
  font-size:16px;
  border-radius:14px;
  border:none;
  background:#43a047;
  color:white;
  margin-top:8px;
}
.controls{display:flex;gap:6px;flex-wrap:wrap}
.hidden{display:none}
.helper{
  background:#fff8e1;
  padding:12px;
  border-radius:12px;
  margin-top:8px;
  display:none;
}
</style>
</head>

<body>
<div class="container">

<!-- المقدمة -->
<div id="intro" class="card">
  <div class="character">
    <div class="avatar">🧔🏻‍♂️</div>
    <div class="name">الحكيم إبراهيم</div>
  </div>
  <div class="speech">
    يا بطل 🌿  
    اليوم سنتعلّم ونفرح بالمحاولة.  
    <b>التعلّم عبادة، والله يرى جهدك.</b>
  </div>

  <p>اسم البطل:</p>
  <input id="studentName">

  <p>اسم ولي الأمر:</p>
  <input id="parentName">

  <button onclick="startStory()">ابدأ الرحلة 🤍</button>
</div>

<!-- القصة -->
<div id="story" class="card hidden">
  <div class="character" id="characterBox"></div>
  <div id="storyText" class="speech"></div>

  <div class="controls">
    <button onclick="speakText()">🗣️ استمع</button>
    <button onclick="toggleSound()">🔈 تشغيل/كتم</button>
  </div>

  <div id="visual" class="visual"></div>

  <input id="answer" type="text" inputmode="numeric" placeholder="كم الناتج؟">

  <button onclick="solve()">أتحقق 🤍</button>
  <button onclick="helpMe()">أنا محتار</button>

  <div id="helper" class="helper"></div>
</div>

</div>

<script>
/* ===== متغيرات عامة ===== */
let student="", parent="";
let step=0, a=0, b=0;
let soundOn=true;

/* ===== عناصر ===== */
const intro=document.getElementById("intro");
const story=document.getElementById("story");
const storyText=document.getElementById("storyText");
const visual=document.getElementById("visual");
const answer=document.getElementById("answer");
const helper=document.getElementById("helper");
const characterBox=document.getElementById("characterBox");
const studentName=document.getElementById("studentName");
const parentName=document.getElementById("parentName");

/* ===== أرقام عربية ===== */
function eastern(n){
  return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
}

/* ===== الشخصيات ===== */
function setCharacter(icon,name){
  characterBox.innerHTML=`<div class="avatar">${icon}</div><div class="name">${name}</div>`;
}

/* ===== القصص ===== */
const stories=[
 {icon:"🐑",name:"الراعي الصادق",thing:"خراف"},
 {icon:"🍯",name:"النحلة المجتهدة",thing:"أقراص عسل"},
 {icon:"🌳",name:"البستاني الأمين",thing:"أشجار"},
 {icon:"🐟",name:"الصياد الهادئ",thing:"أسماك"}
];
let storyIndex=0;

/* ===== التشجيع ===== */
const encouragement=[
 "محاولتك عبادة جميلة 🌷",
 "الله يرى جهدك ويباركه",
 "كل محاولة ترفعك درجة",
 "أحسنت، الصبر مفتاح الخير",
 "النبي ﷺ يحب القوي الأمين"
];

/* ===== بدء ===== */
function startStory(){
  student=studentName.value||"بطلنا";
  parent=parentName.value||"ولي أمره";
  intro.classList.add("hidden");
  story.classList.remove("hidden");
  step=0;
  showStep();
}

/* ===== العرض ===== */
function showStep(){
  answer.value="";
  helper.style.display="none";
  visual.innerHTML="";
  answer.style.display=(step===1)?"block":"none";

  if(step===0){
    setCharacter("🧔🏻‍♂️","الحكيم إبراهيم");
    storyText.innerText=
    `يا ${student}.
سنفكّر معًا بهدوء.
تذكّر: الله مع الصابرين.`;
    speakText();
  }

  if(step===1){
    const s=stories[storyIndex];
    a=Math.floor(Math.random()*3)+2;
    b=Math.floor(Math.random()*3)+1;
    setCharacter(s.icon,s.name);
    storyText.innerText=
    `لدينا ${eastern(a)} مجموعات.
في كل مجموعة ${eastern(b)} ${s.thing}.
كم المجموع؟`;
    for(let i=0;i<a;i++)
      visual.innerHTML+=`${s.icon} `.repeat(b)+"<br>";
    speakText();
  }

  if(step===2){
    const msg=encouragement[Math.floor(Math.random()*encouragement.length)];
    setCharacter("⭐","تشجيع");
    storyText.innerText=
    `أحسنت يا ${student}.
${msg}`;
    visual.innerHTML="🌟 🤍 🌱";
    speakText();
  }
}

/* ===== التحقق ===== */
function solve(){
  if(step===0){step=1;showStep();return;}
  if(step===1){
    if(Number(answer.value)===a*b){
      step=2;
      storyIndex=(storyIndex+1)%stories.length;
      showStep();
    }else{
      storyText.innerText=
      `لا بأس يا ${student}.
الخطأ مرحلة تعلّم،
لنعدّ معًا بهدوء.`;
      speakText();
    }
    return;
  }
  if(step===2){step=1;showStep();}
}

/* ===== مساعدة ===== */
function helpMe(){
  helper.style.display="block";
  helper.innerText=
  `لدينا ${eastern(a)} مجموعات،
في كل مجموعة ${eastern(b)} عناصر،
والجمع المتكرر هو الضرب.`;
  speakText();
}

/* ===== الصوت ===== */
function speakText(){
  if(!soundOn||!('speechSynthesis'in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(storyText.innerText);
  u.lang="ar-SA";
  speechSynthesis.speak(u);
}
function toggleSound(){
  soundOn=!soundOn;
  if(!soundOn)speechSynthesis.cancel();
}
</script>

</body>
</html>
