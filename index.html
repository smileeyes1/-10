<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>البطل الأمين – رحلة الضرب</title>

<style>
body{
  font-family:"Tajawal",Arial;
  margin:0;
  background:#e8f5e9;
  color:#1b5e20;
}
.container{max-width:540px;margin:auto;padding:14px}
.card{
  background:#fff;
  border-radius:18px;
  padding:16px;
  margin-top:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.character{
  display:flex;gap:10px;align-items:center;
}
.avatar{font-size:40px}
.name{font-weight:bold}
.speech{
  background:#e0f2f1;
  padding:14px;
  border-radius:14px;
  line-height:1.8;
}
.visual{text-align:center;font-size:26px;margin:10px 0}
input{
  width:100%;
  font-size:22px;
  text-align:center;
  padding:6px;
}
button{
  padding:8px 18px;
  font-size:17px;
  border-radius:14px;
  border:none;
  background:#43a047;
  color:white;
  margin-top:8px;
}
.hidden{display:none}
.helper{
  background:#fff8e1;
  padding:12px;
  border-radius:12px;
  margin-top:8px;
  display:none;
}
</style>
</head>

<body>
<div class="container">

<!-- المقدمة -->
<div id="intro" class="card">
  <div class="character">
    <div class="avatar">🧔🏻‍♂️</div>
    <div class="name">الحكيم إبراهيم</div>
  </div>
  <div class="speech">
    مرحبًا أيها البطل 🌱<br>
    اليوم نحتاجك في مهمة خير.<br>
    تذكّر: <b>النبي ﷺ يحب القوي الأمين</b>.
  </div>
  <p>اسم البطل:</p>
  <input id="studentName">
  <p>اسم ولي الأمر:</p>
  <input id="parentName">
  <button onclick="startStory()">ابدأ القصة</button>
</div>

<!-- القصة -->
<div id="story" class="card hidden">

  <div id="characterBox" class="character"></div>
  <div id="storyText" class="speech"></div>

  <div id="visual" class="visual"></div>

  <input id="answer" type="number" placeholder="كم المجموع؟">

  <button onclick="solve()">أساعد 🤍</button>
  <button onclick="help()">أنا محتار</button>

  <div id="helper" class="helper"></div>

</div>

</div>

<script>
let student,parent;
let step=0;
let a,b;

function eastern(n){
  return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
}

function startStory(){
  student=studentName.value||"بطلنا";
  parent=parentName.value||"ولي أمره";
  intro.classList.add("hidden");
  story.classList.remove("hidden");
  nextStep();
}

function setCharacter(avatar,name){
  characterBox.innerHTML=
    `<div class="avatar">${avatar}</div><div class="name">${name}</div>`;
}

function nextStep(){
  answer.value="";
  helper.style.display="none";
  visual.innerHTML="";

  if(step===0){
    setCharacter("🧔🏻‍♂️","الحكيم إبراهيم");
    storyText.innerHTML=
      `يا ${student} 🌿<br>
       في وادي التعاون، هناك صديق يحتاج مساعدتك.<br>
       هل أنت مستعد؟`;
  }

  if(step===1){
    a=3; b=2;
    setCharacter("👨‍🏫","المعلّم محمد");
    storyText.innerHTML=
      `لدى الراعي ${eastern(a)} حظائر.<br>
       في كل حظيرة ${eastern(b)} خراف 🐑.<br>
       كم خروفًا لديه؟`;

    for(let i=0;i<a;i++){
      visual.innerHTML += "🐑 ".repeat(b) + "<br>";
    }
  }

  if(step===2){
    setCharacter("🧔🏻‍♂️","الحكيم إبراهيم");
    storyText.innerHTML=
      `أحسنت يا ${student} 🌟<br>
       ساعدت الراعي، وكنت أمينًا.<br>
       <b>الله يرى جهدك ويباركه.</b>`;
    visual.innerHTML="🌿 🐑 🌱";
  }

  step++;
}

function solve(){
  if(step===2){ nextStep(); return; }

  if(Number(answer.value)===a*b){
    storyText.innerHTML=
      `نجحت 🌟<br>
       هذه ${eastern(a)} مجموعات، في كل مجموعة ${eastern(b)}.<br>
       محاولتك عبادة جميلة.`;
    setTimeout(nextStep,1200);
  }else{
    storyText.innerHTML=
      `لا بأس يا ${student}.<br>
       الخطأ طريق الفهم، والله مع الصابرين.`;
  }
}

function help(){
  helper.style.display="block";
  helper.innerHTML=
    `عدّ بهدوء 🌿<br>
     ${eastern(a)} مجموعات × ${eastern(b)} عناصر.<br>
     هو جمع متكرر.`;
}
</script>
</body>
</html>
